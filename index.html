<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>星空雷達</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000008;
    --star: #e8e4ff;
    --dim: rgba(232,228,255,0.35);
    --accent: #c084fc;
    --accent2: #818cf8;
    --red: #ff2200;
    --card-bg: rgba(8,6,24,0.88);
    --border: rgba(192,132,252,0.2);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    color: var(--star);
    touch-action: none;
    user-select: none;
  }

  /* ── Camera background ── */
  #camera-bg {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.6s;
    z-index: 0;
  }
  #camera-bg.active { opacity: 1; }

  /* ── Star canvas ── */
  #sky {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  /* ── Top HUD ── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: linear-gradient(to bottom, rgba(0,0,8,0.7) 0%, transparent 100%);
  }

  #hud-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--accent);
  }

  #compass {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: var(--star);
    min-width: 60px;
    text-align: center;
  }

  #time-display {
    font-size: 11px;
    color: var(--dim);
    text-align: right;
    line-height: 1.5;
  }

  /* ── Crosshair ── */
  #crosshair {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
  }
  #crosshair svg { opacity: 0.5; }

  /* ── Info card (bottom) ── */
  #info-card {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 20px 22px 36px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  #info-card.visible { transform: translateY(0); }

  #card-constellation {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--star);
    margin-bottom: 4px;
  }
  #card-latin {
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }
  #card-desc {
    font-size: 13px;
    line-height: 1.7;
    color: rgba(232,228,255,0.6);
  }
  #card-stars {
    margin-top: 10px;
    font-size: 12px;
    color: rgba(232,228,255,0.4);
  }

  /* ── Bottom toolbar ── */
  #toolbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 30;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 14px 0 30px;
    background: linear-gradient(to top, rgba(0,0,8,0.85) 0%, transparent 100%);
    transition: transform 0.4s;
  }
  #toolbar.card-open { transform: translateY(-170px); }

  .tool-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    background: none;
    border: none;
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 0.04em;
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 12px;
    transition: color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .tool-btn svg { width: 24px; height: 24px; }
  .tool-btn.active { color: var(--accent); }
  .tool-btn:active { background: rgba(192,132,252,0.1); }

  /* ── Night mode overlay ── */
  #night-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(255,10,0,0.18);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
    mix-blend-mode: multiply;
  }
  #night-overlay.active { opacity: 1; }

  /* ── 偵測狀態面板 ── */
  #detect-panel {
    position: fixed;
    top: 70px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    z-index: 12;
    width: 240px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 12px 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
  }
  #detect-panel.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  #detect-status {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  #detect-count {
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
  }
  #detect-close {
    background: none;
    border: none;
    color: var(--dim);
    font-size: 14px;
    cursor: pointer;
    padding: 2px 6px;
  }
  #detect-slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: var(--dim);
  }
  #detect-slider {
    flex: 1;
    accent-color: var(--accent);
  }

  /* ── Permission screen ── */
  #perm-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    text-align: center;
    gap: 20px;
  }
  #perm-screen.hidden { display: none; }

  #perm-icon {
    font-size: 56px;
    margin-bottom: 8px;
  }
  #perm-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--star);
  }
  #perm-desc {
    font-size: 14px;
    line-height: 1.7;
    color: rgba(232,228,255,0.5);
    max-width: 280px;
  }
  #perm-btn {
    margin-top: 12px;
    padding: 14px 36px;
    background: var(--accent);
    color: #000;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  #perm-error {
    font-size: 13px;
    color: #f87171;
    display: none;
  }

  /* ── No-gyro fallback (desktop/testing) ── */
  #no-gyro-hint {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 8;
    font-size: 12px;
    color: rgba(232,228,255,0.3);
    text-align: center;
    pointer-events: none;
    display: none;
  }

  /* ── Altitude arc ── */
  #altitude-bar {
    position: fixed;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 6;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  #altitude-label {
    font-size: 10px;
    color: var(--dim);
    writing-mode: vertical-rl;
    letter-spacing: 0.08em;
  }
  #altitude-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
    min-width: 36px;
    text-align: center;
  }
</style>
</head>

<script>
// OpenCV.js 在使用者第一次按「偵測」時才載入（避免拖慢開啟 / 省流量）
function loadOpenCV() {
  return new Promise((resolve, reject) => {
    if (window.cv && window.cv.Mat) { cvReady = true; return resolve(); }
    if (document.getElementById('opencv-script')) {
      // 已在載入中，等它完成
      const wait = setInterval(() => {
        if (window.cv && window.cv.Mat) { clearInterval(wait); cvReady = true; resolve(); }
      }, 200);
      return;
    }
    const s = document.createElement('script');
    s.id = 'opencv-script';
    s.src = 'https://docs.opencv.org/4.10.0/opencv.js';
    s.async = true;
    s.onload = () => {
      // OpenCV 載入後還需等 runtime 初始化
      if (window.cv && window.cv.Mat) { cvReady = true; resolve(); }
      else { window.cv = window.cv || {}; window.cv.onRuntimeInitialized = () => { cvReady = true; resolve(); }; }
    };
    s.onerror = () => reject(new Error('OpenCV.js 載入失敗'));
    document.body.appendChild(s);
  });
}
</script>

// ── 請求權限 ─────────────────────────────────────────────────
async function requestPermissions() {
  const btn = document.getElementById('perm-btn');
  const err = document.getElementById('perm-error');
  btn.textContent = '取得中…';
  btn.disabled = true;

  // iOS 陀螺儀授權
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res !== 'granted') throw new Error('陀螺儀授權被拒絕');
    } catch(e) {
      err.textContent = e.message;
      err.style.display = 'block';
      btn.textContent = '重試';
      btn.disabled = false;
      return;
    }
  }

  // GPS
  navigator.geolocation.getCurrentPosition(
    pos => {
      lat = pos.coords.latitude;
      lon = pos.coords.longitude;
      document.getElementById('time-gps').textContent =
        `${lat.toFixed(2)}°N ${lon.toFixed(2)}°E`;
      startApp();
    },
    () => {
      // GPS 失敗仍可繼續（用台中預設）
      document.getElementById('time-gps').textContent = '台中（預設）';
      startApp();
    },
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

function startApp() {
  document.getElementById('perm-screen').classList.add('hidden');
  initGyro();
  startRender();
  updateClock();
  setInterval(updateClock, 10000);
}

// ── 陀螺儀 ───────────────────────────────────────────────────
function initGyro() {
  if (!('DeviceOrientationEvent' in window)) {
    document.getElementById('no-gyro-hint').style.display = 'block';
    hasGyro = false;
    return;
  }
  window.addEventListener('deviceorientationabsolute', onOrientation, true);
  window.addEventListener('deviceorientation', onOrientation, true);
  hasGyro = true;
}

function onOrientation(e) {
  if (!gyroActive) return;
  // alpha=方位角(0=North on absolute), beta=仰角, gamma=翻轉
  if (e.absolute && e.alpha !== null) {
    azimuth = (360 - e.alpha) % 360;
  } else if (e.webkitCompassHeading !== undefined) {
    azimuth = e.webkitCompassHeading;
  }
  if (e.beta !== null) {
    altitude = Math.max(-90, Math.min(90, e.beta - 90));
  }
}

function toggleGyro() {
  gyroActive = !gyroActive;
  document.getElementById('btn-gyro').classList.toggle('active', gyroActive);
  if (!gyroActive) {
    // 手動滑動模式提示
    document.getElementById('no-gyro-hint').style.display = gyroActive ? 'none' : 'block';
  } else {
    document.getElementById('no-gyro-hint').style.display = 'none';
  }
}
gyroActive = true; // 預設開啟

// ── 相機 ─────────────────────────────────────────────────────
async function toggleCamera() {
  const video = document.getElementById('camera-bg');
  const btn = document.getElementById('btn-camera');
  if (!cameraActive) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 } }
      });
      video.srcObject = stream;
      video.classList.add('active');
      cameraActive = true;
      btn.classList.add('active');
    } catch(e) {
      alert('無法開啟相機：' + e.message);
    }
  } else {
    if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
    video.classList.remove('active');
    cameraActive = false;
    btn.classList.remove('active');
  }
}

// ── 星點偵測（階段二）─────────────────────────────────────────
async function toggleDetect() {
  const btn = document.getElementById('btn-detect');
  const panel = document.getElementById('detect-panel');

  if (!detectActive) {
    // 偵測需要相機開著
    if (!cameraActive) {
      await toggleCamera();
      if (!cameraActive) return; // 相機開啟失敗就中止
    }
    // 載入 OpenCV
    if (!cvReady) {
      document.getElementById('detect-count').textContent = '載入 OpenCV…';
      panel.classList.add('visible');
      try {
        await loadOpenCV();
      } catch(e) {
        document.getElementById('detect-count').textContent = 'OpenCV 載入失敗';
        return;
      }
    }
    // 建立離螢幕處理 canvas
    if (!processCanvas) {
      processCanvas = document.createElement('canvas');
      processCtx = processCanvas.getContext('2d', { willReadFrequently: true });
    }
    detectActive = true;
    btn.classList.add('active');
    panel.classList.add('visible');
  } else {
    detectActive = false;
    detectedStars = [];
    btn.classList.remove('active');
    panel.classList.remove('visible');
  }
}

// 從相機影格偵測亮點（節流：每 DETECT_INTERVAL ms 一次）
function detectStars() {
  if (!detectActive || !cvReady || !cameraActive) return;
  const now = performance.now();
  if (now - lastDetectTime < DETECT_INTERVAL) return;
  lastDetectTime = now;

  const video = document.getElementById('camera-bg');
  if (video.readyState < 2 || !video.videoWidth) return;

  // 降採樣處理（加速）：處理寬度固定 480
  const pw = 480;
  const ph = Math.round(pw * video.videoHeight / video.videoWidth);
  processCanvas.width = pw;
  processCanvas.height = ph;
  processCtx.drawImage(video, 0, 0, pw, ph);

  let src, gray, blurred, thresh, contours, hierarchy;
  try {
    src = cv.imread(processCanvas);
    gray = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

    // 輕微模糊去噪
    blurred = new cv.Mat();
    cv.GaussianBlur(gray, blurred, new cv.Size(3, 3), 0);

    // 二值化：只留下夠亮的點
    thresh = new cv.Mat();
    cv.threshold(blurred, thresh, detectThreshold, 255, cv.THRESH_BINARY);

    // 找輪廓（每個亮塊 = 候選星點）
    contours = new cv.MatVector();
    hierarchy = new cv.Mat();
    cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    const found = [];
    const sx = canvas.width / pw;   // 處理座標 → 螢幕座標的縮放
    const sy = canvas.height / ph;

    for (let i = 0; i < contours.size(); i++) {
      const cnt = contours.get(i);
      const area = cv.contourArea(cnt);
      // 過濾：太小的是雜訊，太大的是月亮/燈光/雲
      if (area >= 1 && area <= 400) {
        const m = cv.moments(cnt);
        if (m.m00 > 0) {
          const cx = m.m10 / m.m00;
          const cy = m.m01 / m.m00;
          // 取該點亮度
          const px = Math.min(pw-1, Math.max(0, Math.round(cx)));
          const py = Math.min(ph-1, Math.max(0, Math.round(cy)));
          const bright = gray.ucharPtr(py, px)[0];
          found.push({
            x: cx * sx,
            y: cy * sy,
            r: Math.max(3, Math.sqrt(area) * sx * 1.5),
            brightness: bright
          });
        }
      }
      cnt.delete();
    }

    // 依亮度排序，最多保留 80 個（避免畫面太亂）
    found.sort((a, b) => b.brightness - a.brightness);
    detectedStars = found.slice(0, 80);

    document.getElementById('detect-count').textContent =
      `偵測到 ${detectedStars.length} 個亮點`;
  } catch(e) {
    console.error('偵測錯誤', e);
  } finally {
    if (src) src.delete();
    if (gray) gray.delete();
    if (blurred) blurred.delete();
    if (thresh) thresh.delete();
    if (contours) contours.delete();
    if (hierarchy) hierarchy.delete();
  }
}

// 把偵測到的亮點畫到主 canvas 上
function drawDetectedStars() {
  if (!detectActive || detectedStars.length === 0) return;
  ctx.save();
  detectedStars.forEach(s => {
    // 綠色圈標記偵測到的亮點
    ctx.strokeStyle = 'rgba(74,222,128,0.9)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r + 4, 0, Math.PI*2);
    ctx.stroke();
    // 中心十字
    ctx.strokeStyle = 'rgba(74,222,128,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s.x - s.r - 7, s.y);
    ctx.lineTo(s.x - s.r - 2, s.y);
    ctx.moveTo(s.x + s.r + 2, s.y);
    ctx.lineTo(s.x + s.r + 7, s.y);
    ctx.stroke();
  });
  ctx.restore();
}

// ── 夜間模式 ─────────────────────────────────────────────────
function toggleNight() {
  nightMode = !nightMode;
  document.getElementById('night-overlay').classList.toggle('active', nightMode);
  document.getElementById('btn-night').classList.toggle('active', nightMode);
}

// ── 資訊卡 ───────────────────────────────────────────────────
function toggleCard() {
  cardOpen = !cardOpen;
  document.getElementById('info-card').classList.toggle('visible', cardOpen);
  document.getElementById('toolbar').classList.toggle('card-open', cardOpen);
  document.getElementById('btn-info').classList.toggle('active', cardOpen);
}

function showConst(c) {
  document.getElementById('card-constellation').textContent = c.zh;
  document.getElementById('card-latin').textContent = c.lat;
  document.getElementById('card-desc').textContent = c.desc;
  document.getElementById('card-stars').textContent = '主要亮星：' + c.bright;
  if (!cardOpen) toggleCard();
  currentConst = c;
}

// ── 時鐘 ─────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('time-loc').textContent = `${h}:${m}`;
}

// ── 天文座標轉換 ─────────────────────────────────────────────
// 赤道座標(RA,Dec) → 地平座標(方位角,仰角)
function equatorialToHorizontal(ra_deg, dec_deg, lat_deg, lon_deg, date) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;

  // Julian Date
  const jd = Astronomy.MakeTime(date);
  // 恆星時
  const gst = Astronomy.SiderealTime(jd);
  const lst = ((gst * 15 + lon_deg) % 360 + 360) % 360; // 本地恆星時（度）
  const ha = ((lst - ra_deg) % 360 + 360) % 360; // 時角

  const ha_r = toRad(ha);
  const dec_r = toRad(dec_deg);
  const lat_r = toRad(lat_deg);

  const sinAlt = Math.sin(dec_r)*Math.sin(lat_r) + Math.cos(dec_r)*Math.cos(lat_r)*Math.cos(ha_r);
  const alt = toDeg(Math.asin(Math.max(-1,Math.min(1,sinAlt))));

  const cosAz = (Math.sin(dec_r) - Math.sin(lat_r)*sinAlt) / (Math.cos(lat_r)*Math.cos(toRad(alt)));
  let az = toDeg(Math.acos(Math.max(-1,Math.min(1,cosAz))));
  if (Math.sin(ha_r) > 0) az = 360 - az;

  return { az, alt };
}

// 地平座標 → 螢幕座標（中心=當前視角，FOV=80°）
const FOV = 80;
function horizToScreen(az_target, alt_target, az_center, alt_center, w, h) {
  let daz = az_target - az_center;
  if (daz > 180) daz -= 360;
  if (daz < -180) daz += 360;
  const dalt = alt_target - alt_center;
  const scale = w / FOV;
  const x = w/2 + daz * scale;
  const y = h/2 - dalt * scale;
  return { x, y };
}

// ── 渲染 ─────────────────────────────────────────────────────
function render() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const now = new Date();
  const camAlpha = cameraActive ? 0.6 : 1.0;

  // 夜空背景（相機開啟時半透明）
  if (!cameraActive) {
    const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, h);
    grad.addColorStop(0, '#06052a');
    grad.addColorStop(1, '#000008');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }

  // 更新 HUD
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const idx = Math.round(azimuth / 22.5) % 16;
  document.getElementById('compass').textContent = dirs[idx];
  document.getElementById('altitude-value').textContent = Math.round(altitude) + '°';

  // 背景星點（隨機但固定 seed）
  ctx.globalAlpha = cameraActive ? 0.7 : 1.0;
  drawBackgroundStars(w, h, az_center=azimuth, alt_center=altitude);

  // 星座
  ctx.globalAlpha = cameraActive ? 0.8 : 1.0;
  let closestConst = null;
  let closestDist = 30; // 只顯示 30° 以內的

  CONSTELLATIONS.forEach(c => {
    const pos = equatorialToHorizontal(c.ra, c.dec, lat, lon, now);
    const dist = Math.sqrt(Math.pow(angularDiff(pos.az, azimuth), 2) + Math.pow(pos.alt - altitude, 2));

    // 只繪製在視野附近的星座
    if (dist > 60) return;

    const alpha = Math.max(0.1, 1 - dist/60);

    // 繪製連線
    if (c.lines && c.lines.length > 0 && c.stars.length > 0) {
      ctx.strokeStyle = `rgba(129,140,248,${alpha * 0.4})`;
      ctx.lineWidth = 0.8;
      c.lines.forEach(([a,b]) => {
        if (!c.stars[a] || !c.stars[b]) return;
        const pa = equatorialToHorizontal(c.stars[a][0], c.stars[a][1], lat, lon, now);
        const pb = equatorialToHorizontal(c.stars[b][0], c.stars[b][1], lat, lon, now);
        const sa = horizToScreen(pa.az, pa.alt, azimuth, altitude, w, h);
        const sb = horizToScreen(pb.az, pb.alt, azimuth, altitude, w, h);
        if (isOnScreen(sa,w,h,150) || isOnScreen(sb,w,h,150)) {
          ctx.beginPath();
          ctx.moveTo(sa.x, sa.y);
          ctx.lineTo(sb.x, sb.y);
          ctx.stroke();
        }
      });
    }

    // 繪製主星座標籤
    const sc = horizToScreen(pos.az, pos.alt, azimuth, altitude, w, h);
    if (isOnScreen(sc, w, h, 80)) {
      // 光暈
      const glow = ctx.createRadialGradient(sc.x, sc.y, 0, sc.x, sc.y, 24);
      glow.addColorStop(0, `rgba(192,132,252,${alpha * 0.3})`);
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(sc.x, sc.y, 24, 0, Math.PI*2);
      ctx.fill();

      // 星點
      ctx.fillStyle = `rgba(232,228,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(sc.x, sc.y, 3, 0, Math.PI*2);
      ctx.fill();

      // 星座名稱
      ctx.font = `600 13px -apple-system, sans-serif`;
      ctx.fillStyle = `rgba(192,132,252,${alpha})`;
      ctx.textAlign = 'center';
      ctx.fillText(c.zh, sc.x, sc.y - 14);
      ctx.font = `400 10px -apple-system, sans-serif`;
      ctx.fillStyle = `rgba(192,132,252,${alpha * 0.6})`;
      ctx.fillText(c.lat, sc.x, sc.y - 2);
    }

    if (dist < closestDist) {
      closestDist = dist;
      closestConst = c;
    }
  });

  ctx.globalAlpha = 1.0;

  // 星點偵測（階段二）：偵測 + 畫出綠圈
  detectStars();
  drawDetectedStars();

  // 若有最近星座，更新資訊卡
  if (closestConst && closestConst !== currentConst) {
    showConst(closestConst);
  }

  animFrame = requestAnimationFrame(render);
}

function angularDiff(a, b) {
  let d = a - b;
  if (d > 180) d -= 360;
  if (d < -180) d += 360;
  return d;
}

function isOnScreen(p, w, h, margin=0) {
  return p.x > -margin && p.x < w+margin && p.y > -margin && p.y < h+margin;
}

// 固定 seed 的背景星點（視差效果：視角移動時星點跟著動）
function drawBackgroundStars(w, h, az_center, alt_center) {
  const seed_stars = [];
  // 預先生成固定分布（只跑一次）
  if (!window._bgStars) {
    const rng = mulberry32(42);
    window._bgStars = Array.from({length:200}, () => ({
      az: rng() * 360,
      alt: (rng() - 0.5) * 160,
      r: rng() * 1.5 + 0.4,
      brightness: rng()
    }));
  }
  window._bgStars.forEach(s => {
    const sc = horizToScreen(s.az, s.alt, az_center, alt_center, w, h);
    if (!isOnScreen(sc, w, h, 10)) return;
    // 亮度閃爍
    const twinkle = 0.7 + 0.3 * Math.sin(Date.now()/800 + s.az);
    ctx.fillStyle = `rgba(232,228,255,${s.brightness * twinkle * 0.8})`;
    ctx.beginPath();
    ctx.arc(sc.x, sc.y, s.r, 0, Math.PI*2);
    ctx.fill();
  });
}

function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function startRender() {
  if (animFrame) cancelAnimationFrame(animFrame);
  render();
}

// ── 觸控拖曳（無陀螺儀時手動旋轉）────────────────────────────
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  if (gyroActive) return;
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, az: azimuth, alt: altitude };
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (gyroActive || !touchStart) return;
  const dx = e.touches[0].clientX - touchStart.x;
  const dy = e.touches[0].clientY - touchStart.y;
  azimuth = ((touchStart.az - dx * 0.2) % 360 + 360) % 360;
  altitude = Math.max(-90, Math.min(90, touchStart.alt + dy * 0.2));
}, { passive: true });

// 滑鼠拖曳（桌機測試用）
let mouseDown = false, mouseLast = null;
canvas.addEventListener('mousedown', e => { mouseDown = true; mouseLast = e; });
window.addEventListener('mousemove', e => {
  if (!mouseDown || !mouseLast) return;
  azimuth = ((azimuth - (e.clientX - mouseLast.clientX) * 0.3) % 360 + 360) % 360;
  altitude = Math.max(-90, Math.min(90, altitude + (e.clientY - mouseLast.clientY) * 0.3));
  mouseLast = e;
});
window.addEventListener('mouseup', () => mouseDown = false);
</script>
